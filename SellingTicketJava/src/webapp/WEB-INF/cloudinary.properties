# Cloudinary Configuration for TicketBox
# ==========================================
# IMPORTANT: DO NOT commit this file to Git!
# Add this path to .gitignore: WEB-INF/cloudinary.properties
#
# Setup Instructions:
# 1. Go to https://cloudinary.com → Sign up (free tier: 25GB storage)
# 2. From Dashboard, copy your Cloud Name, API Key, API Secret
# 3. Fill in the values below
# ==========================================

cloudinary.cloud_name=YOUR_CLOUD_NAME_HERE
cloudinary.api_key=YOUR_API_KEY_HERE
cloudinary.api_secret=YOUR_API_SECRET_HERE
cloudinary.secure=true
